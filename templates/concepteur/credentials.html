{% extends "base.html" %}
{% block title %}— Credentials Concepteur{% endblock %}
{% block page_title %}Identifiants Concepteur{% endblock %}

{% block content %}
<div class="concepteur-banner"><i class="fa fa-shield"></i> Mode Concepteur</div>

<div class="card card-form" style="max-width:500px;margin-top:16px">
  <div class="card-header"><h3><i class="fa fa-key"></i> Modifier les identifiants</h3></div>
  <div class="card-body">
    <form method="POST">
      <div class="form-group">
        <label>Mot de passe actuel *</label>
        <input type="password" name="current_password" class="form-control" required>
      </div>
      <div class="form-group">
        <label>Nouveau nom d'utilisateur</label>
        <input type="text" name="new_username" class="form-control" placeholder="Laisser vide pour conserver">
      </div>
      <div class="form-group">
        <label>Nouveau mot de passe</label>
        <input type="password" name="new_password" class="form-control" placeholder="Laisser vide pour conserver">
      </div>
      <div class="form-group">
        <label>Nom d'affichage</label>
        <input type="text" name="display_name" class="form-control" placeholder="Concepteur KetaServer">
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary"><i class="fa fa-save"></i> Mettre a jour</button>
        <a href="{{ url_for('concepteur_dashboard') }}" class="btn btn-secondary">Annuler</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
